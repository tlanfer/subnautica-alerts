name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o pda.exe

      - name: Upload pda.exe
        uses: actions/upload-artifact@v7
        with:
          name: pda
          path: pda.exe
          if-no-files-found: error

      - name: Publish rolling 'latest' release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest pda.exe \
            --title "Latest build" \
            --notes "Automated build of commit ${{ github.sha }}." \
            --target "${{ github.sha }}" \
            --latest
