name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o pda.exe

      - name: Upload pda.exe
        uses: actions/upload-artifact@v7
        with:
          name: pda
          path: pda.exe
          if-no-files-found: error
